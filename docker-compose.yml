services:
  mongo:
    image: mongo:7
    container_name: accounting-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: accounting-server
    ports:
      - "5001:5001"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./.env
    depends_on:
      - mongo

  client:
    build:
      context: ./client
    container_name: accounting-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  mongo_data: